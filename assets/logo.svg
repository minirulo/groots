<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rootsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecca3;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#4ecca3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecca3;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" />
  <circle cx="100" cy="100" r="96" fill="none" stroke="#4ecca3" stroke-width="1.5" opacity="0.4" />

  <!-- Trunk -->
  <line x1="100" y1="155" x2="100" y2="105" stroke="url(#rootsGrad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Roots spreading downward -->
  <path d="M100 145 Q80 155 65 165" stroke="#4ecca3" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M100 145 Q120 155 135 165" stroke="#4ecca3" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M100 150 Q88 162 80 175" stroke="#4ecca3" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M100 150 Q112 162 120 175" stroke="#4ecca3" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M100 155 Q95 168 92 182" stroke="#4ecca3" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M100 155 Q105 168 108 182" stroke="#4ecca3" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Sound wave arcs emanating upward (like a canopy / broadcast) -->
  <!-- Center node -->
  <circle cx="100" cy="100" r="5" fill="#4ecca3" />

  <!-- Wave 1 (innermost) -->
  <path d="M82 100 Q91 82 100 78 Q109 82 118 100" stroke="#4ecca3" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Wave 2 -->
  <path d="M68 100 Q84 68 100 62 Q116 68 132 100" stroke="#4ecca3" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65"/>

  <!-- Wave 3 (outermost) -->
  <path d="M54 100 Q77 54 100 46 Q123 54 146 100" stroke="#4ecca3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Subtle ground line -->
  <line x1="55" y1="158" x2="145" y2="158" stroke="#4ecca3" stroke-width="1" opacity="0.2"/>
</svg>
